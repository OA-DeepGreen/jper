<form class="form" action="" method="POST">
    <div class="row line-space">
        <div class="col span-9">
            <ul class="form-fields">
                <li>
                    <label>Reprocess repository on demand</label>
                </li>
                <li class="form-fields__item--text">
                    <label>
                        <span class="form-fields__label-text">To:</span>
                        <input type="text" name="from" value="{{from}}"/>
                        <input type="text" name="upto" value="{{upto}}"/>
                    </label>
                </li>
                <li class="form-fields__item--text">
                    <label>
                        <span class="form-fields__label-text" style="width: 35%">{{ repository_ids['label'] }}</span>
                        <select name="repository_id">
                            <option value="" {% if repository_ids['selected'] == "" %}selected{% endif %}>Filter by {{ repository_ids['label'] }}</option>
                            {% for key, val in repository_ids['values'].items() %}
                                <option value="{{ val, key }}" {% if repository_ids['selected'] == f"{val}, {key}" %}selected{% endif %}>{{ val }}</option>
                            {% endfor %}
                        </select>
                    </label>
                </li>
            </ul>
        </div>
    </div>
    <div class="row line-space">
        <div class="col span-12">
            <ul class="form-fields">
                <li class="form-fields__item--text">
                    <button class="btn btn--3d btn--primary move-up" type="submit">Reprocess repository</button>
                </li>
            </ul>
        </div>
    </div>
</form>
